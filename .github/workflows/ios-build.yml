name: Build iOS IPA

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build Mira IPA
    runs-on: macos-15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🛠 Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer 2>/dev/null || \
          true
          xcodebuild -version
          swift --version

      - name: 📦 Install XcodeGen
        run: brew install xcodegen

      - name: ⚙️ Generate Xcode project
        run: xcodegen generate

      - name: 📋 Show Schemes
        run: |
          xcodebuild -list -project Mira.xcodeproj 2>&1 || true

      - name: 🔨 Build Archive (no signing)
        run: |
          mkdir -p build
          set -o pipefail
          xcodebuild archive \
            -project Mira.xcodeproj \
            -scheme Mira \
            -archivePath build/Mira.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee build/build.log

      - name: 📦 Export IPA
        run: |
          mkdir -p build/ipa-output/Payload

          APP_PATH=""
          for candidate in \
            "build/Mira.xcarchive/Products/Applications/Mira.app"; do
            if [ -d "$candidate" ]; then
              APP_PATH="$candidate"
              break
            fi
          done

          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build/Mira.xcarchive -name "*.app" -type d 2>/dev/null | head -1)
          fi

          if [ -n "$APP_PATH" ]; then
            echo "Found .app at: $APP_PATH"
            cp -r "$APP_PATH" build/ipa-output/Payload/
            cd build/ipa-output
            zip -r Mira.ipa Payload/
            echo "✅ IPA created successfully!"
            ls -lh Mira.ipa
          else
            echo "⚠️ No .app found. Archive structure:"
            find build/Mira.xcarchive -type d 2>/dev/null | head -50 || echo "No archive"
            exit 1
          fi

      - name: 📤 Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Mira-iOS-IPA
          path: build/ipa-output/Mira.ipa
          retention-days: 30

      - name: 📤 Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build/build.log
          retention-days: 7

      - name: 📋 Build Summary
        if: always()
        run: |
          echo "## 🔨 Build Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f build/ipa-output/Mira.ipa ]; then
            SIZE=$(du -h build/ipa-output/Mira.ipa | cut -f1)
            echo "✅ **IPA built successfully!** Size: ${SIZE}" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ IPA was not produced. Check build logs." >> $GITHUB_STEP_SUMMARY
          fi
